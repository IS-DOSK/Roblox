<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8"/>
<meta name="viewport" content="width=device-width,initial-scale=1.0"/>
<title>Roblox</title>
<link rel="stylesheet" href="style.css"/>
</head>
<body>

<!-- NAVBAR -->
<nav class="navbar">
  <a href="index.html" class="nav-logo">
    <img src="roblox-logo.png" alt="Roblox" class="roblox-logo-img"/>
  </a>
  <div class="nav-links">
    <a href="#">Charts</a>
    <a href="#">Marketplace</a>
    <a href="#">Create</a>
    <a href="#">Robux</a>
  </div>
  <div class="nav-search">
    <svg width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="#888" stroke-width="2.5"><circle cx="11" cy="11" r="8"/><path d="m21 21-4.35-4.35"/></svg>
    <input type="text" placeholder="Search"/>
  </div>
  <a href="signup.html" class="nav-signup">Sign Up</a>
</nav>

<!-- BACKGROUND -->
<div class="bg-image"></div>
<div class="bg-overlay"></div>

<!-- LOGIN CARD -->
<div class="page-center">
  <div class="auth-card">
    <h1>Login to Roblox</h1>

    <form id="loginForm">
      <input type="text" id="username" placeholder="Username/Email/Phone" autocomplete="username"/>
      <div class="pass-wrap">
        <input type="password" id="password" placeholder="Password" autocomplete="current-password"/>
        <button type="button" id="eyeBtn" class="eye-btn" title="Show/Hide">
          <svg id="eyeIcon" width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="#888" stroke-width="2"><path d="M1 12s4-8 11-8 11 8 11 8-4 8-11 8-11-8-11-8z"/><circle cx="12" cy="12" r="3"/></svg>
        </button>
      </div>
      <p class="err" id="errMsg"></p>
      <button type="submit" class="login-btn">Log In</button>
    </form>

    <a href="unavailable.html" class="forgot">Forgot Password or Username?</a>
    <div class="sep"></div>
    <button class="alt-btn" onclick="location.href='unavailable.html'">Email Me a One-Time Code</button>
    <button class="alt-btn" onclick="location.href='unavailable.html'">Quick Sign-in</button>
    <p class="bottom-link">Don't have an account? <a href="signup.html">Sign Up</a></p>
  </div>
</div>

<script src="auth.js"></script>
</body>
</html>
